<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Resumen operativo | Dielca Kiosko Backoffice</title>
  </head>
  <body
    data-app-page="dashboard"
    x-data="{ page: 'dashboard', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <div
              class="mb-6 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"
            >
              <div>
                <h1
                  class="text-xl font-semibold text-gray-800 dark:text-white/90"
                >
                  Resumen operativo
                </h1>
                <p
                  class="mt-1 text-sm text-gray-500 dark:text-gray-400"
                  data-page-subtitle
                >
                  Preparando la vista operativa del kiosko Dielca.
                </p>
              </div>

              <div
                class="inline-flex w-fit items-center gap-2 rounded-full border border-gray-200 bg-white px-4 py-2 text-sm text-gray-600 shadow-theme-xs dark:border-gray-800 dark:bg-white/[0.03] dark:text-gray-300"
              >
                <span
                  class="h-2.5 w-2.5 rounded-full bg-warning-500"
                  data-source-dot
                ></span>
                <span data-data-source-badge>Conectando con datos...</span>
              </div>
            </div>

            <div
              class="mb-6 hidden rounded-2xl border border-warning-200 bg-warning-50 px-4 py-3 text-sm text-warning-700 dark:border-warning-500/20 dark:bg-warning-500/10 dark:text-warning-300"
              data-alert-region
            ></div>

            <div class="grid grid-cols-12 gap-4 md:gap-6">
              <div class="col-span-12 space-y-6 xl:col-span-7">
                <include src="./partials/metric-group/metric-group-01.html" />
                <include src="./partials/chart/chart-01.html" />
              </div>
              <div class="col-span-12 xl:col-span-5">
                <include src="./partials/chart/chart-02.html" />
              </div>

              <div class="col-span-12">
                <include src="./partials/chart/chart-03.html" />
              </div>

              <div class="col-span-12 xl:col-span-5">
                <include src="./partials/map-01.html" />
              </div>

              <div class="col-span-12 xl:col-span-7">
                <include src="./partials/table/table-01.html" />
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
