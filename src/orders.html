<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Pedidos | Dielca Kiosko Backoffice</title>
  </head>
  <body
    data-app-page="orders"
    x-data="{ page: 'orders', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <include src="./partials/preloader.html"></include>

    <div class="flex h-screen overflow-hidden">
      <include src="./partials/sidebar.html"></include>

      <div
        class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto"
      >
        <include src="./partials/overlay.html" />
        <include src="./partials/header.html" />

        <main>
          <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
            <div x-data="{ pageName: `Pedidos`}">
              <include src="./partials/breadcrumb.html" />
            </div>

            <div
              class="mb-6 rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] sm:p-6"
            >
              <div
                class="mb-5 flex flex-col gap-2 lg:flex-row lg:items-center lg:justify-between"
              >
                <div>
                  <h3
                    class="text-lg font-semibold text-gray-800 dark:text-white/90"
                  >
                    Listado operativo
                  </h3>
                  <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                    Busqueda por pedido, contacto, notas, sede o estado.
                  </p>
                </div>

                <div
                  class="inline-flex w-fit items-center gap-2 rounded-full border border-gray-200 bg-gray-50 px-4 py-2 text-sm text-gray-600 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-300"
                >
                  <span
                    class="h-2.5 w-2.5 rounded-full bg-warning-500"
                    data-source-dot
                  ></span>
                  <span data-data-source-badge>Cargando origen de datos...</span>
                </div>
              </div>

              <div
                class="mb-5 hidden rounded-xl border border-warning-200 bg-warning-50 px-4 py-3 text-sm text-warning-700 dark:border-warning-500/20 dark:bg-warning-500/10 dark:text-warning-300"
                data-alert-region
              ></div>

              <form
                class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-5"
                data-orders-filters
              >
                <label class="block">
                  <span
                    class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300"
                    >Buscar</span
                  >
                  <input
                    type="search"
                    name="search"
                    placeholder="Pedido, telefono, nota..."
                    class="shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-200 bg-transparent px-4 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:outline-hidden dark:border-gray-800 dark:bg-white/[0.03] dark:text-white/90 dark:placeholder:text-white/30"
                  />
                </label>

                <label class="block">
                  <span
                    class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300"
                    >Sede</span
                  >
                  <select
                    name="site"
                    class="shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-200 bg-transparent px-4 text-sm text-gray-800 focus:ring-3 focus:outline-hidden dark:border-gray-800 dark:bg-white/[0.03] dark:text-white/90"
                    data-site-filter
                  >
                    <option value="">Todas las sedes</option>
                  </select>
                </label>

                <label class="block">
                  <span
                    class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300"
                    >Estado</span
                  >
                  <select
                    name="status"
                    class="shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-200 bg-transparent px-4 text-sm text-gray-800 focus:ring-3 focus:outline-hidden dark:border-gray-800 dark:bg-white/[0.03] dark:text-white/90"
                    data-status-filter
                  >
                    <option value="">Todos los estados</option>
                  </select>
                </label>

                <label class="block">
                  <span
                    class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300"
                    >Ordenar por</span
                  >
                  <select
                    name="sort"
                    class="shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-200 bg-transparent px-4 text-sm text-gray-800 focus:ring-3 focus:outline-hidden dark:border-gray-800 dark:bg-white/[0.03] dark:text-white/90"
                    data-sort-filter
                  >
                    <option value="attention_oldest">Prioridad operativa</option>
                    <option value="oldest">Mas antiguo primero</option>
                    <option value="newest">Mas nuevo primero</option>
                    <option value="price_desc">Mayor importe primero</option>
                    <option value="price_asc">Menor importe primero</option>
                  </select>
                </label>

                <div class="flex items-end gap-3 md:col-span-2 xl:col-span-1">
                  <button
                    type="submit"
                    class="inline-flex h-11 items-center justify-center rounded-lg bg-brand-500 px-5 text-sm font-medium text-white hover:bg-brand-600"
                  >
                    Aplicar
                  </button>
                  <button
                    type="button"
                    class="inline-flex h-11 items-center justify-center rounded-lg border border-gray-300 px-5 text-sm font-medium text-gray-700 hover:bg-gray-50 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-white/[0.03]"
                    data-reset-filters
                  >
                    Limpiar
                  </button>
                </div>
              </form>
            </div>

            <div class="space-y-5 sm:space-y-6">
              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div class="px-5 py-4 sm:px-6 sm:py-5">
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Pedidos historicos
                  </h3>
                  <p
                    class="mt-1 text-sm text-gray-500 dark:text-gray-400"
                    data-orders-result-summary
                  >
                    Cargando pedidos...
                  </p>
                </div>
                <div
                  class="border-t border-gray-100 p-5 dark:border-gray-800 sm:p-6"
                >
                  <include src="./partials/table/table-06.html" />
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
